name: Changelog Preview

on:
  # Allow this workflow to be called from other repositories.
  #
  # USAGE REQUIREMENTS:
  # When calling this workflow from another repository, you must:
  #
  # 1. Use pull_request_target (NOT pull_request):
  #    - This is required to post comments on PRs from forks
  #    - pull_request event has read-only GITHUB_TOKEN for fork PRs
  #
  # 2. Grant required permissions at the call site:
  #    - contents: read       (to checkout repo and read git history)
  #    - pull-requests: write (to post/update PR comments)
  #
  # 3. Inherit secrets:
  #    - secrets: inherit     (ensures caller's GITHUB_TOKEN is used)
  #
  # Example caller workflow:
  #
  #   on:
  #     pull_request_target:
  #       types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  #
  #   permissions:
  #     contents: read
  #     pull-requests: write
  #
  #   jobs:
  #     changelog-preview:
  #       uses: getsentry/craft/.github/workflows/changelog-preview.yml@v2
  #       secrets: inherit
  #
  # SECURITY NOTES FOR CALLERS:
  # Callers that invoke this workflow on pull_request_target are checking out
  # attacker-controlled code and running Craft against it. To reduce blast
  # radius, callers SHOULD:
  # - Pin this workflow to a commit SHA, not a moving tag like @v2.
  # - Grant only the minimum permissions shown above; never add
  #   `contents: write` or other scopes to this job.
  # - Be aware that Craft reads `.craft.env` from the config-file directory
  #   and copies its keys into the environment; hardening for that case is
  #   tracked separately.
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory to run Craft in (relative to repo root)'
        required: false
        type: string
        default: '.'
      craft-version:
        description: 'Version of Craft to use (tag or "latest")'
        required: false
        type: string

  # Also run on PRs in this repository (dogfooding).
  #
  # We intentionally use `pull_request` (not `pull_request_target`) here so the
  # job runs with a read-only GITHUB_TOKEN for fork PRs. Same-repo branch PRs
  # still get the declared permissions and a working comment; fork PRs won't
  # get a preview comment, which is an acceptable trade-off for eliminating
  # the pull_request_target attack surface on this repository.
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # For pull_request_target callers we must explicitly specify the ref to
      # get the PR commits. Try the merge ref first; fall back to head ref if
      # the PR has merge conflicts.
      #
      # `persist-credentials: false` ensures the GITHUB_TOKEN is not written
      # into `.git/config` on disk, which would otherwise leak if a later step
      # executes PR-controlled code.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        id: checkout-merge
        continue-on-error: true
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.checkout-merge.outcome == 'failure'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Craft
        shell: bash
        run: |
          set -euo pipefail

          CRAFT_VERSION="${{ inputs.craft-version || 'latest' }}"

          if [[ "$CRAFT_VERSION" == "latest" || -z "$CRAFT_VERSION" ]]; then
            echo "Downloading latest Craft release..."
            CRAFT_URL=$(curl -fsSL "https://api.github.com/repos/getsentry/craft/releases/latest" \
              | jq -r '.assets[] | select(.name == "craft") | .browser_download_url')
          else
            CRAFT_URL="https://github.com/getsentry/craft/releases/download/${CRAFT_VERSION}/craft"
            echo "Downloading Craft ${CRAFT_VERSION}..."
            
            # Fallback to latest if specified version doesn't exist
            if ! curl -sfI "$CRAFT_URL" >/dev/null 2>&1; then
              echo "Release not found for version '${CRAFT_VERSION}', falling back to latest..."
              CRAFT_URL=$(curl -fsSL "https://api.github.com/repos/getsentry/craft/releases/latest" \
                | jq -r '.assets[] | select(.name == "craft") | .browser_download_url')
            fi
          fi

          # Verify we have a valid URL
          if [[ -z "$CRAFT_URL" ]]; then
            echo "::error::Failed to determine Craft download URL"
            exit 1
          fi

          echo "Installing Craft from: ${CRAFT_URL}"
          sudo curl -fsSL -o /usr/local/bin/craft "$CRAFT_URL"
          sudo chmod +x /usr/local/bin/craft

          # Verify installation
          if [[ ! -s /usr/local/bin/craft ]]; then
            echo "::error::Downloaded Craft binary is empty or missing"
            exit 1
          fi

          craft --version

      - name: Generate Changelog Preview
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CRAFT_LOG_LEVEL: Warn
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "Running craft changelog --pr $PR_NUMBER --format json..."
          RESULT=$(craft changelog --pr "$PR_NUMBER" --format json 2>/dev/null || echo '{"changelog":"","bumpType":null}')

          CHANGELOG=$(echo "$RESULT" | jq -r '.changelog // ""')
          BUMP_TYPE=$(echo "$RESULT" | jq -r '.bumpType // "none"')
          PR_SKIPPED=$(echo "$RESULT" | jq -r '.prSkipped // false')
          VERSIONING_POLICY=$(echo "$RESULT" | jq -r '.versioningPolicy // "auto"')

          if [[ "$PR_SKIPPED" == "true" ]]; then
            CHANGELOG="_This PR will not appear in the changelog._"
          elif [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="_No changelog entries will be generated from this PR._"
          fi

          # CalVer projects don't use semver bumps — skip the impact badge
          if [[ "$VERSIONING_POLICY" == "calver" ]]; then
            BUMP_BADGE=""
            SECTION_HEADING="Changelog Preview"
          else
            case "$BUMP_TYPE" in
              major) BUMP_BADGE="🔴 **Major** (breaking changes)" ;;
              minor) BUMP_BADGE="🟡 **Minor** (new features)" ;;
              patch) BUMP_BADGE="🟢 **Patch** (bug fixes)" ;;
              *) BUMP_BADGE="⚪ **None** (no version bump detected)" ;;
            esac

            SECTION_HEADING="Semver Impact of This PR"
          fi

          COMMENT_FILE=$(mktemp)
          cat > "$COMMENT_FILE" << CRAFT_CHANGELOG_COMMENT_END
          <!-- craft-changelog-preview -->
          ## ${SECTION_HEADING}

          ${BUMP_BADGE}

          <details>
          <summary>📋 Changelog Preview</summary>

          This is how your changes will appear in the changelog.
          Entries from this PR are highlighted with a left border (blockquote style).

          ---

          ${CHANGELOG}

          ---

          </details>

          <sub>🤖 This preview updates automatically when you update the PR.</sub>
          CRAFT_CHANGELOG_COMMENT_END

          COMMENT_ID=$(gh api \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- craft-changelog-preview -->")) | .id' \
            | head -1)

          if [[ -n "$COMMENT_ID" ]]; then
            echo "Updating existing comment $COMMENT_ID..."
            gh api -X PATCH \
              "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
              -F body=@"$COMMENT_FILE"
          else
            echo "Creating new comment..."
            gh api -X POST \
              "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              -F body=@"$COMMENT_FILE"
          fi

          rm -f "$COMMENT_FILE"
          echo "✓ Comment posted"
